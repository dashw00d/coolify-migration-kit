; Laravel supervisord config.
;
; Runs php-fpm + nginx + Laravel scheduler + queue worker.
; For non-Laravel / no-artisan apps use variants/supervisord.custom.conf instead.

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

; Socket + RPC interface. Without these, `supervisorctl status` can't connect
; to the running supervisord and reports "no such file". With them in place:
;   docker exec <container> supervisorctl -c /etc/supervisor/conf.d/supervisord.conf status
[unix_http_server]
file=/run/supervisord.sock
chmod=0700

[supervisorctl]
serverurl=unix:///run/supervisord.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; Laravel 11+ long-running scheduler. Replaces the `* * * * * php artisan
; schedule:run` cron you used to put on the host.
; nice -n 10 lowers scheduler priority so burst web traffic wins CPU contention.
[program:schedule-work]
command=nice -n 10 php /var/www/html/artisan schedule:work
user=www-data
autostart=true
autorestart=true
priority=20
stopwaitsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; Queue worker. Tune --queue / --tries / --max-time per app needs.
; Harmless if the app doesn't use queues — it idles on an empty queue.
[program:queue-worker]
command=nice -n 10 php /var/www/html/artisan queue:work --sleep=3 --tries=3 --max-time=3600
user=www-data
numprocs=1
autostart=true
autorestart=true
priority=25
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
