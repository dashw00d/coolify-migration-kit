; Non-Laravel supervisord config.
;
; For apps without `artisan`. Runs php-fpm + nginx + a minute-ticking loop
; that calls a standalone schedule script (what you used to run from host cron).
;
; Customize `schedule-loop` command for your app's entry script.
; If your app has no scheduler, just delete the [program:schedule-loop] block.

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/run/supervisord.sock
chmod=0700

[supervisorctl]
serverurl=unix:///run/supervisord.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; Scheduler: one-shot schedule script on a 60-second loop.
; Simpler than installing cron inside the container.
; Replace schedule-run.php with whatever your app uses.
; nice -n 10 lowers scheduler priority so burst web traffic wins CPU contention.
[program:schedule-loop]
command=/bin/sh -c "while true; do nice -n 10 php /var/www/html/schedule-run.php; sleep 60; done"
user=www-data
autostart=true
autorestart=true
priority=20
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; No queue worker. If this app uses Laravel queues, switch to the main
; supervisord.conf in the parent directory instead.
