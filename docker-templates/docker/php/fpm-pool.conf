; PHP-FPM pool overrides. Alpine's default pool ships with max_children=5
; which queues anything past ~5 concurrent requests. For a small VPS running
; 1-2 Laravel apps, 20 workers is a good starting point.
;
; Each Laravel worker holds ~30-60 MB resident. 20 workers ≈ 1 GB per app.
; If memory-constrained, measure actual worker RSS and drop max_children:
;   docker exec <container> sh -c "ps -o rss= -p \$(pgrep -f 'php-fpm: pool') \
;     | awk '{s+=\$1} END {print s/1024/NR \" MB avg\"}'"

[www]
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 8
; Recycle workers periodically to release any slowly-leaked memory.
pm.max_requests = 500

; Route worker stdout/stderr through php-fpm → container logs.
catch_workers_output = yes
decorate_workers_output = no
