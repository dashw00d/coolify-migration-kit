; Production OpCache config — tuned for Laravel-style PHP 8.3 apps.
;
; validate_timestamps=0 makes OpCache serve compiled bytecode from memory
; indefinitely without checking file mtimes. Safe because we rebuild the
; container on every deploy — a fresh container always has fresh OpCache.
; DO NOT edit PHP files inside a running container; they won't take effect
; until restart.

opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.fast_shutdown=1
; Keep PHPDoc comments — Laravel/Doctrine use reflection on attributes.
opcache.save_comments=1

; JIT: 1255 = function-level + tracing. Noticeably faster on Laravel's
; dispatch code compared to 1254 (tracing only) or disabled (0).
opcache.jit=1255
opcache.jit_buffer_size=128M

; Realpath cache — each stat() skipped saves syscalls on every include.
realpath_cache_size=4M
realpath_cache_ttl=600
